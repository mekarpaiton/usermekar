<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect x="10" y="10" width="180" height="180" rx="20" fill="#7F00FF" fill-opacity="0.05"/>
  <rect x="10" y="10" width="180" height="180" rx="20" stroke="#7F00FF" stroke-width="3"/>
  
  <!-- Icon Bangunan Simple -->
  <g transform="translate(100, 70)">
    <!-- Gedung utama -->
    <rect x="-35" y="0" width="70" height="60" rx="4" fill="#1E88E5"/>
    
    <!-- Garis-garis khas TB MEKAR -->
    <rect x="-25" y="20" width="5" height="40" fill="#E53935"/>
    <rect x="-15" y="20" width="5" height="40" fill="#FFF59D"/>
    <rect x="-5" y="5" width="6" height="50" fill="#1E88E5"/>
    <rect x="5" y="20" width="5" height="40" fill="#FFF59D"/>
    <rect x="15" y="20" width="5" height="40" fill="#E53935"/>
    
    <!-- Atap + Text MEKAR -->
    <rect x="-40" y="-12" width="80" height="12" rx="2" fill="#1565C0"/>
    <text x="0" y="-2" font-family="Arial Black, sans-serif" font-size="8" font-weight="900" fill="white" text-anchor="middle">MEKAR PAITON</text>
    
    <!-- Pintu -->
    <rect x="-7" y="40" width="10" height="20" fill="#333" fill-opacity="0.7"/>
  </g>
  
  <!-- Text TB. MEKAR -->
  <text x="100" y="165" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#7F00FF" text-anchor="middle">TB. MEKAR</text>
</svg>